apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: anfa-analyse-cluster-k8s
  namespace: spark
spec:
  type: Python
  mode: cluster
  image: "apache/spark:3.5.8-python3"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/jobs/analyse_referentiel_cluster.py"
  sparkVersion: "3.5.8"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureInterval: 10
    timeWindow: 60
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    labels:
      version: 3.5.8
    serviceAccount: spark-operator
  executor:
    cores: 1
    instances: 2
    memory: "512m"
    labels:
      version: 3.5.8